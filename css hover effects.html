<!DOCTYPE html>
<html>

<head>
    <title>Hover Effects</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .btn {
            padding: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: red;
        }

        .card {
            transition: 0.3s;
            padding: 15px;

        }

        .card:hover {
            transform: translateX(-10px);
        }
    </style>
</head>

<body>
    <h2>CSS Hover Effects</h2>
    <button class="btn">Hover Me</button>
    <div class="card">
        <h3>Hover Card</h3>
        <p>This card moves upward when hovered.</p>
    </div>
</body>

</html>
